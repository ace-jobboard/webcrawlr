name: University Link Checker

on:
  schedule:
    - cron: "0 7 * * *"   # Every day at 8:00 AM Paris time (UTC+1)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no email)"
        required: false
        default: "false"

jobs:

  # ── Site 1 ────────────────────────────────────────────────────────────────────
  crawl-site-1:
    name: "Crawl: ${{ vars.SITE_1_NAME }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Crawl
        env:
          BASE_URL:        ${{ vars.SITE_1_URL }}
          SITE_NAME:       ${{ vars.SITE_1_NAME }}
          MAX_PAGES:       ${{ vars.MAX_PAGES || '1000' }}
          REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '10' }}
          DELAY_SECONDS:   ${{ vars.DELAY_SECONDS || '0.5' }}
          CHECK_EXTERNAL:  ${{ vars.CHECK_EXTERNAL || 'false' }}
        run: python link_checker.py || true   # don't fail — report job decides
      - uses: actions/upload-artifact@v4
        with:
          name: results-site-1
          path: results_*.json
          retention-days: 7

  # ── Site 2 ────────────────────────────────────────────────────────────────────
  crawl-site-2:
    name: "Crawl: ${{ vars.SITE_2_NAME }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Crawl
        env:
          BASE_URL:        ${{ vars.SITE_2_URL }}
          SITE_NAME:       ${{ vars.SITE_2_NAME }}
          MAX_PAGES:       ${{ vars.MAX_PAGES || '1000' }}
          REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '10' }}
          DELAY_SECONDS:   ${{ vars.DELAY_SECONDS || '0.5' }}
          CHECK_EXTERNAL:  ${{ vars.CHECK_EXTERNAL || 'false' }}
        run: python link_checker.py || true
      - uses: actions/upload-artifact@v4
        with:
          name: results-site-2
          path: results_*.json
          retention-days: 7

  # ── Site 3 ────────────────────────────────────────────────────────────────────
  crawl-site-3:
    name: "Crawl: ${{ vars.SITE_3_NAME }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Crawl
        env:
          BASE_URL:        ${{ vars.SITE_3_URL }}
          SITE_NAME:       ${{ vars.SITE_3_NAME }}
          MAX_PAGES:       ${{ vars.MAX_PAGES || '1000' }}
          REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '10' }}
          DELAY_SECONDS:   ${{ vars.DELAY_SECONDS || '0.5' }}
          CHECK_EXTERNAL:  ${{ vars.CHECK_EXTERNAL || 'false' }}
        run: python link_checker.py || true
      - uses: actions/upload-artifact@v4
        with:
          name: results-site-3
          path: results_*.json
          retention-days: 7

  # ── Site 4 ────────────────────────────────────────────────────────────────────
  crawl-site-4:
    name: "Crawl: ${{ vars.SITE_4_NAME }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Crawl
        env:
          BASE_URL:        ${{ vars.SITE_4_URL }}
          SITE_NAME:       ${{ vars.SITE_4_NAME }}
          MAX_PAGES:       ${{ vars.MAX_PAGES || '1000' }}
          REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '10' }}
          DELAY_SECONDS:   ${{ vars.DELAY_SECONDS || '0.5' }}
          CHECK_EXTERNAL:  ${{ vars.CHECK_EXTERNAL || 'false' }}
        run: python link_checker.py || true
      - uses: actions/upload-artifact@v4
        with:
          name: results-site-4
          path: results_*.json
          retention-days: 7

  # ── Site 5 ────────────────────────────────────────────────────────────────────
  crawl-site-5:
    name: "Crawl: ${{ vars.SITE_5_NAME }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Crawl
        env:
          BASE_URL:        ${{ vars.SITE_5_URL }}
          SITE_NAME:       ${{ vars.SITE_5_NAME }}
          MAX_PAGES:       ${{ vars.MAX_PAGES || '1000' }}
          REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '10' }}
          DELAY_SECONDS:   ${{ vars.DELAY_SECONDS || '0.5' }}
          CHECK_EXTERNAL:  ${{ vars.CHECK_EXTERNAL || 'false' }}
        run: python link_checker.py || true
      - uses: actions/upload-artifact@v4
        with:
          name: results-site-5
          path: results_*.json
          retention-days: 7

  # ── Combined report ── waits for ALL crawls to finish ────────────────────────
  send-report:
    name: Send Combined Email Report
    runs-on: ubuntu-latest
    needs: [crawl-site-1, crawl-site-2, crawl-site-3, crawl-site-4, crawl-site-5]
    if: always()   # run even if some crawl jobs failed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          merge-multiple: true

      - name: Send combined report
        env:
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
        run: |
          FLAGS="--report --results-dir all-results"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python link_checker.py $FLAGS
